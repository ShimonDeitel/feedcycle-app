name: Feedcycle
options:
  bundleIdPrefix: com.shimondeitel.feedcycle
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Feedcycle:
    type: application
    platform: iOS
    sources:
      - path: Feedcycle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.feedcycle
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Feedcycle/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FeedcycleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FeedcycleTests
      - path: Feedcycle.storekit
    dependencies:
      - target: Feedcycle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.feedcycle.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FeedcycleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FeedcycleUITests
    dependencies:
      - target: Feedcycle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.feedcycle.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Feedcycle:
    build:
      targets:
        Feedcycle: all
        FeedcycleTests: [test]
        FeedcycleUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Feedcycle.storekit
    test:
      config: Debug
      storeKitConfiguration: Feedcycle.storekit
      targets:
        - FeedcycleTests
        - FeedcycleUITests
    archive:
      config: Release
